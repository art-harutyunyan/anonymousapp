// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',

        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">

          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>

          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(0,0,0,0.07)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

      <div style={{

        boxShadow: dark

          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',

              color: sugg, letterSpacing: -0.43, lineHeight: '22px',

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,

        position: 'relative',

        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>

          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {

// ── Geometric avatar — identity without a face ──────────────────────────────
function GeometricAvatar({ seed = 0, size = 64, ring = false, style = {} }) {
  const palettes = [

    ['#06b6d4', '#6366f1'],
    ['#10b981', '#3b82f6'],
    ['#f59e0b', '#ef4444'],

    ['#f472b6', '#fb923c'],
    ['#34d399', '#818cf8'],
    ['#60a5fa', '#f472b6'],
  ];
  const [c1, c2] = palettes[seed % palettes.length];
  const gid = `g_${seed}_${size}`;
  const shapeType = Math.floor(seed / palettes.length) % 4;
  const shape = () => {
    if (shapeType === 0) return <circle cx="50" cy="50" r="40" fill={`url(#${gid})`} />;

    return <polygon points="50,8 93,30 93,70 50,92 7,70 7,30" fill={`url(#${gid})`} />;

    <div style={{ width: size, height: size, flexShrink: 0, ...style }}>

    <button
      onClick={!disabled ? onClick : undefined}
      onMouseDown={() => setPressed(true)}

      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      style={{
        border: 'none', cursor: disabled ? 'default' : 'pointer', outline: 'none',

// ── Onboard Screen ─────────────────────────────────────────────────────────────
function OnboardScreen({ onComplete }) {
  const [step, setStep] = React.useState(0);
  const [profile, setProfile] = React.useState({ gender:'', lookingFor:'', intent:'', interests:[] });
  const totalSteps = 4;

  const canContinue = () => {
    if (step === 0) return !!profile.gender;
    if (step === 1) return !!profile.lookingFor;
    if (step === 2) return !!profile.intent;
    if (step === 3) return profile.interests.length >= 3;
    return false;
  };

  const next = () => {
    if (step < totalSteps - 1) setStep(s => s + 1);
    else onComplete(profile);
  };

  const genders = ['Man','Woman','Non-binary'];
  const lookingFors = ['Men','Women','Anyone'];
  const intents = ['Friendship','Dating','Casual Chat','Just Talk'];

  const OptionCard = ({ label, selected, onClick }) => (
    <div onClick={onClick} style={{
      flex:1, padding:'16px 12px', borderRadius:16, textAlign:'center',
      cursor:'pointer', transition:'all 0.18s ease', userSelect:'none',
      border:`1.5px solid ${selected ? 'transparent' : 'rgba(0,0,0,0.08)'}`,
      background: selected ? THEME.gradient : 'rgba(255,255,255,0.85)',
      color: selected ? '#fff' : THEME.textMuted,
      fontFamily:THEME.fontBody, fontSize:15, fontWeight:600,
      boxShadow: selected ? '0 4px 20px rgba(124,58,237,0.25)' : 'none',
      transform: selected ? 'scale(1.02)' : 'scale(1)',
    }}>{label}</div>
  );

  const toggleInterest = (i) => {
    const list = profile.interests;
    const next = list.includes(i) ? list.filter(x => x !== i) : [...list, i];
    setProfile(p => ({ ...p, interests: next }));
  };

  const steps = [
    {
      title: 'I am a…',
      subtitle: 'This helps us find your matches',
      content: (
        <div style={{ display:'flex', gap:10 }}>
          {genders.map(g => <OptionCard key={g} label={g} selected={profile.gender === g} onClick={() => setProfile(p => ({ ...p, gender: g }))} />)}
        </div>
      ),
    },
    {
      title: 'I\'m looking for…',
      subtitle: 'Who would you like to match with?',
      content: (
        <div style={{ display:'flex', gap:10 }}>
          {lookingFors.map(l => <OptionCard key={l} label={l} selected={profile.lookingFor === l} onClick={() => setProfile(p => ({ ...p, lookingFor: l }))} />)}
        </div>
      ),
    },
    {
      title: 'I\'m here to…',
      subtitle: 'Set the tone for your conversations',
      content: (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          {intents.map(i => <OptionCard key={i} label={i} selected={profile.intent === i} onClick={() => setProfile(p => ({ ...p, intent: i }))} />)}
        </div>
      ),
    },
    {
      title: 'My interests',
      subtitle: `Pick at least 3 — ${profile.interests.length} selected`,
      content: (
        <div style={{ display:'flex', flexWrap:'wrap', gap:9 }}>
          {INTERESTS_LIST.map(i => (
            <PillTag key={i} label={i} selected={profile.interests.includes(i)} onClick={() => toggleInterest(i)} />
          ))}
        </div>
      ),
    },
  ];

  return (
    <Screen>
      <div style={{ height:58 }} />
      {/* progress bar */}
      <div style={{ padding:'0 24px 0', marginBottom:0 }}>
        <div style={{ height:3, background:'rgba(0,0,0,0.07)', borderRadius:3, overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${((step + 1) / totalSteps) * 100}%`, background:THEME.gradient, borderRadius:3, transition:'width 0.4s ease' }} />
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:8 }}>
          <span style={{ fontSize:12, color:THEME.textDim, fontFamily:THEME.fontBody }}>Step {step+1} of {totalSteps}</span>
          {step > 0 && <span onClick={() => setStep(s => s-1)} style={{ fontSize:12, color:THEME.accent, fontFamily:THEME.fontBody, cursor:'pointer', fontWeight:600 }}>← Back</span>}
        </div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'20px 24px 0' }}>
        <h2 style={{ fontFamily:THEME.fontDisplay, fontSize:28, color:THEME.text, margin:'0 0 6px', fontWeight:700 }}>{steps[step].title}</h2>
        <p style={{ fontFamily:THEME.fontBody, fontSize:14, color:THEME.textMuted, margin:'0 0 24px' }}>{steps[step].subtitle}</p>
        {steps[step].content}
      </div>

      <div style={{ padding:'16px 24px 32px' }}>
        <GradBtn full onClick={next} disabled={!canContinue()}>
          {step === totalSteps - 1 ? 'Start Discovering' : 'Continue'}
        </GradBtn>
      </div>
    </Screen>
  );
}

// ── Discover Screen ────────────────────────────────────────────────────────────
function DiscoverScreen({ onNavigate, onMatch, unreadChats }) {
  const [queue, setQueue] = React.useState([...MOCK_PROFILES]);
  const [animState, setAnimState] = React.useState('idle'); // idle | leaving-left | leaving-right
  const [showMatchPulse, setShowMatchPulse] = React.useState(false);

  const current = queue[0];
  const next = queue[1];

  const act = (action) => {
    if (!current || animState !== 'idle') return;
    setAnimState(action === 'skip' ? 'leaving-left' : 'leaving-right');
    setTimeout(() => {
      setQueue(q => q.slice(1));
      setAnimState('idle');
      if (action === 'like' && Math.random() > 0.35) {
        setTimeout(() => onMatch(current), 200);
      }
    }, 380);
  };

  const cardTransform = animState === 'leaving-left'
    ? 'translateX(-120%) rotate(-18deg)' : animState === 'leaving-right'
    ? 'translateX(120%) rotate(18deg)' : 'translateX(0) rotate(0deg)';

  return (
    <Screen>
      {/* header */}
      <div style={{ height:58 }} />
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 24px 8px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>

          </svg>
          {unreadChats > 0 && <div style={{ position:'absolute', top:-4, right:-4, width:14, height:14, borderRadius:7, background:THEME.gradient, fontSize:9, color:'#fff', fontFamily:THEME.fontBody, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', border:'2px solid #070511' }}>{unreadChats}</div>}
        </div>
      </div>

      {/* card stack */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'8px 20px', position:'relative' }}>
        {queue.length === 0 ? (
          <div style={{ textAlign:'center', padding:'0 32px' }}>
            <GeometricAvatar seed={6} size={64} ring style={{ margin:'0 auto 20px' }} />
            <h3 style={{ fontFamily:THEME.fontDisplay, fontSize:24, color:THEME.text, margin:'0 0 10px' }}>You've seen everyone</h3>
            <p style={{ fontFamily:THEME.fontBody, fontSize:14, color:THEME.textMuted, margin:'0 0 24px', lineHeight:1.6 }}>New profiles are added daily. Check back tomorrow or explore your matches.</p>
            <GradBtn sm onClick={() => setQueue([...MOCK_PROFILES])}>Refresh Profiles</GradBtn>
          </div>
        ) : (
          <>
            {/* back card */}
            {next && (
              <div style={{ position:'absolute', width:'calc(100% - 56px)', maxWidth:320, transform:'scale(0.94) translateY(16px)', zIndex:1 }}>
                <ProfileCard profile={next} dim />
              </div>
            )}
            {/* front card */}
            <div style={{
              position:'relative', width:'calc(100% - 40px)', maxWidth:330, zIndex:2,
              transform: cardTransform,
              opacity: animState !== 'idle' ? 0 : 1,
              transition: animState !== 'idle' ? 'transform 0.38s ease, opacity 0.38s ease' : 'none',
            }}>
              <ProfileCard profile={current} />
            </div>
          </>
        )}
      </div>

      {/* action buttons */}
      {queue.length > 0 && (
        <div style={{ display:'flex', justifyContent:'center', gap:24, padding:'0 0 16px' }}>
          <ActionBtn type="skip" onClick={() => act('skip')} />
          <ActionBtn type="like" onClick={() => act('like')} />

  );

            <GeometricAvatar seed={6} size={56} style={{ margin:'0 auto 16px' }} />
            <p style={{ fontFamily:THEME.fontBody, fontSize:15, color:THEME.textMuted }}>No matches yet.<br/>Start discovering to connect.</p>
            <div style={{ marginTop:20 }}><GradBtn sm onClick={() => onNavigate('discover')}>Go Discover</GradBtn></div>
          </div>
        ) : matches.map((m, i) => (
          <div key={m.id} onClick={() => onOpenChat(m)} style={{
            display:'flex', alignItems:'center', gap:14, padding:'14px 16px',
            borderRadius:18, cursor:'pointer', marginBottom:6,
            background:'rgba(255,255,255,0.75)', border:'1px solid rgba(255,255,255,0.95)',
            transition:'background 0.15s ease',
          }}
            onMouseEnter={e => e.currentTarget.style.background='rgba(0,0,0,0.07)'}
            onMouseLeave={e => e.currentTarget.style.background='rgba(255,255,255,0.75)'}
          >
            <div style={{ position:'relative' }}>
              <GeometricAvatar seed={m.seed} size={50} />
              {m.unread > 0 && (
                <div style={{ position:'absolute', bottom:0, right:-2, width:16, height:16, borderRadius:8, background:THEME.gradient, fontSize:9, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:THEME.fontBody, fontWeight:700, border:'2px solid #070511' }}>{m.unread}</div>
              )}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:3 }}>
                <span style={{ fontFamily:THEME.fontBody, fontSize:15, fontWeight:600, color:THEME.text }}>{m.nickname}</span>
                <span style={{ fontFamily:THEME.fontBody, fontSize:11, color:THEME.textDim }}>{m.time}</span>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <IntentBadge intent={m.intent} />
                <span style={{ fontFamily:THEME.fontBody, fontSize:13, color:THEME.textMuted, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:120 }}>{m.lastMsg}</span>
              </div>
            </div>
            <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="rgba(26,15,46,0.22)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        ))}
      </div>

      <BottomNav active="chats" onNavigate={onNavigate} unreadChats={totalUnread} />
    </Screen>
  );
}

// ── Chat Screen ────────────────────────────────────────────────────────────────
function ChatScreen({ match, onBack, messages: initMsgs, onBlock, onReport }) {
  const [msgs, setMsgs] = React.useState(initMsgs || []);
  const [input, setInput] = React.useState('');
  const [showMenu, setShowMenu] = React.useState(false);
  const [showReport, setShowReport] = React.useState(false);
  const [reportReason, setReportReason] = React.useState('');
  const [reportSent, setReportSent] = React.useState(false);
  const bottomRef = React.useRef(null);
  const REPORT_REASONS = ['Harassment or bullying','Spam or scam','Inappropriate content','Fake profile','Other'];

  const send = () => {
    if (!input.trim()) return;
    setMsgs(m => [...m, { id: Date.now(), text: input, me: true, time: 'Now' }]);
    setInput('');
    // simulate reply
    setTimeout(() => {
      const replies = ["That's really interesting!", "Tell me more about that", "Haha yes exactly!", "I feel the same way", "Wow I never thought of it like that"];
      setMsgs(m => [...m, { id: Date.now()+1, text: replies[Math.floor(Math.random() * replies.length)], me: false, time: 'Now' }]);
    }, 1200);
  };

  React.useEffect(() => {
    if (bottomRef.current) {
      bottomRef.current.parentNode.scrollTop = bottomRef.current.parentNode.scrollHeight;
    }
  }, [msgs]);

  return (
    <Screen>
      <div style={{ height:58 }} />
      {/* chat header */}
      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 20px 12px', borderBottom:'1px solid rgba(0,0,0,0.07)' }}>
        <div onClick={onBack} style={{ cursor:'pointer', padding:'4px 8px 4px 0' }}>
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke={THEME.textMuted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <GeometricAvatar seed={match.seed} size={40} />
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:THEME.fontBody, fontSize:16, fontWeight:600, color:THEME.text }}>{match.nickname}</div>
          <IntentBadge intent={match.intent} />
        </div>
        <div style={{ position:'relative' }}>
          <div onClick={e => { e.stopPropagation(); setShowMenu(m => !m); }} style={{ cursor:'pointer', padding:'4px 6px', borderRadius:8, background: showMenu ? 'rgba(0,0,0,0.06)' : 'transparent' }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.5" fill={THEME.textMuted}/><circle cx="12" cy="12" r="1.5" fill={THEME.textMuted}/><circle cx="12" cy="19" r="1.5" fill={THEME.textMuted}/></svg>
          </div>
          {showMenu && (
            <div onClick={e => e.stopPropagation()} style={{ position:'absolute', right:0, top:'calc(100% + 6px)', zIndex:50, background:'#fff', borderRadius:14, border:'1px solid rgba(0,0,0,0.09)', boxShadow:'0 8px 32px rgba(0,0,0,0.12)', minWidth:170, overflow:'hidden' }}>
              <div onClick={() => { setShowMenu(false); onBlock && onBlock(match); }}
                style={{ padding:'13px 16px', fontFamily:THEME.fontBody, fontSize:14, fontWeight:500, color:'#e11d48', cursor:'pointer', display:'flex', alignItems:'center', gap:10, borderBottom:'1px solid rgba(0,0,0,0.06)' }}
                onMouseEnter={e => e.currentTarget.style.background='rgba(225,29,72,0.05)'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#e11d48" strokeWidth="2"/><line x1="5" y1="19" x2="19" y2="5" stroke="#e11d48" strokeWidth="2.5" strokeLinecap="round"/></svg>
                Block partner
              </div>
              <div onClick={() => { setShowMenu(false); setShowReport(true); }}
                style={{ padding:'13px 16px', fontFamily:THEME.fontBody, fontSize:14, fontWeight:500, color:THEME.text, cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}
                onMouseEnter={e => e.currentTarget.style.background='rgba(0,0,0,0.04)'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke={THEME.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Report
              </div>
            </div>
          )}
        </div>
      </div>

      {/* messages */}
      <div style={{ flex:1, overflowY:'auto', padding:'16px 18px', display:'flex', flexDirection:'column', gap:10 }}>
        {msgs.map(m => (
          <div key={m.id} style={{ display:'flex', justifyContent: m.me ? 'flex-end' : 'flex-start' }}>
            <div style={{
              maxWidth:'78%', padding:'10px 14px', borderRadius: m.me ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
              fontFamily:THEME.fontBody, fontSize:14, lineHeight:1.5,
              ...(m.me ? {
                background: THEME.gradient,
                color:'#fff',
                boxShadow:'0 2px 12px rgba(124,58,237,0.18)',
              } : {
                background:'rgba(255,255,255,0.95)',
                color:THEME.text,
                border:'1px solid rgba(0,0,0,0.08)',
              }),
            }}>
              {m.text}
              <div style={{ fontSize:10, color: m.me ? 'rgba(255,255,255,0.5)' : THEME.textDim, marginTop:4, textAlign:'right' }}>{m.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef} />
      </div>

      {/* input bar */}
      <div style={{ display:'flex', gap:10, padding:'12px 16px 32px', borderTop:'1px solid rgba(0,0,0,0.07)', alignItems:'flex-end' }}>
        <div style={{ flex:1 }}>
          <input
            value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && send()}
            placeholder="Say something…"
            style={{
              width:'100%', boxSizing:'border-box', padding:'12px 16px',
              background:'rgba(0,0,0,0.05)', border:'1.5px solid rgba(0,0,0,0.08)',
              borderRadius:20, color:THEME.text, fontSize:14, fontFamily:THEME.fontBody,
              outline:'none',
            }}
          />
        </div>
        <div onClick={send} style={{
          width:44, height:44, borderRadius:22, flexShrink:0,
          background: input.trim() ? THEME.gradient : 'rgba(0,0,0,0.05)',
          display:'flex', alignItems:'center', justifyContent:'center',
          cursor:'pointer', transition:'all 0.2s ease',
          boxShadow: input.trim() ? '0 4px 16px rgba(124,58,237,0.25)' : 'none',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z" stroke={input.trim() ? '#fff' : THEME.textDim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      </div>

      {/* Report modal */}
      {showReport && (
        <div style={{ position:'absolute', inset:0, zIndex:80, display:'flex', alignItems:'flex-end', background:'rgba(26,15,46,0.35)', backdropFilter:'blur(4px)' }} onClick={() => setShowReport(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background:'#faf6f0', borderRadius:'24px 24px 0 0', padding:'24px 24px 40px', width:'100%', boxShadow:'0 -8px 40px rgba(0,0,0,0.15)' }}>
            {reportSent ? (
              <div style={{ textAlign:'center', padding:'20px 0' }}>
                <div style={{ width:52, height:52, borderRadius:26, background:'rgba(5,150,105,0.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 14px' }}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#059669" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div style={{ fontFamily:THEME.fontDisplay, fontSize:20, color:THEME.text, fontWeight:700 }}>Report sent</div>
                <p style={{ fontFamily:THEME.fontBody, fontSize:14, color:THEME.textMuted, marginTop:6 }}>Our team will review this. Thank you.</p>
              </div>
            ) : (
              <>
                <div style={{ width:40, height:4, borderRadius:2, background:'rgba(0,0,0,0.1)', margin:'0 auto 20px' }} />
                <h3 style={{ fontFamily:THEME.fontDisplay, fontSize:22, color:THEME.text, fontWeight:700, margin:'0 0 6px' }}>Report {match.nickname}</h3>
                <p style={{ fontFamily:THEME.fontBody, fontSize:13, color:THEME.textMuted, margin:'0 0 18px' }}>Select a reason for your report</p>
                <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:22 }}>
                  {REPORT_REASONS.map(r => (
                    <div key={r} onClick={() => setReportReason(r)} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 14px', borderRadius:12, cursor:'pointer', border:`1.5px solid ${reportReason===r ? THEME.accent : 'rgba(0,0,0,0.09)'}`, background: reportReason===r ? 'rgba(124,58,237,0.05)' : '#fff', transition:'all 0.15s' }}>
                      <div style={{ width:18, height:18, borderRadius:9, border:`2px solid ${reportReason===r ? THEME.accent : 'rgba(0,0,0,0.2)'}`, background: reportReason===r ? THEME.accent : 'transparent', flexShrink:0, transition:'all 0.15s', display:'flex', alignItems:'center', justifyContent:'center' }}>
                        {reportReason===r && <div style={{ width:6, height:6, borderRadius:3, background:'#fff' }} />}
                      </div>
                      <span style={{ fontFamily:THEME.fontBody, fontSize:14, color:THEME.text }}>{r}</span>
                    </div>
                  ))}
                </div>
                <GradBtn full onClick={() => { if (!reportReason) return; onReport && onReport(match, reportReason); setReportSent(true); setTimeout(() => { setShowReport(false); setReportSent(false); setReportReason(''); }, 1600); }} disabled={!reportReason}>Submit Report</GradBtn>
              </>
            )}
          </div>
        </div>
      )}
    </Screen>
  );
}

// ── Profile Screen ─────────────────────────────────────────────────────────────
function ProfileScreen({ onNavigate, blockedList = [], reportedList = [], onUnblock }) {
  const [myInterests, setMyInterests] = React.useState(['Travel','Photography','Coffee','Philosophy','Music']);
  const [expanded, setExpanded] = React.useState(null);
  const [showSignOut, setShowSignOut] = React.useState(false);
  const [notifications, setNotifications] = React.useState({ newMatch:true, newMessage:true, weeklyDigest:false });
  const [privacy, setPrivacy] = React.useState({ showOnline:true, readReceipts:true });

  const toggle = key => setExpanded(e => e === key ? null : key);
  const toggleInterest = i => setMyInterests(list => list.includes(i) ? list.filter(x => x !== i) : [...list, i]);

  const Toggle = ({ on, onChange }) => (
    <div onClick={onChange} style={{ width:44, height:26, borderRadius:13, position:'relative', cursor:'pointer', background: on ? THEME.gradient : 'rgba(0,0,0,0.12)', transition:'all 0.2s', flexShrink:0 }}>
      <div style={{ position:'absolute', top:3, left: on ? 21 : 3, width:20, height:20, borderRadius:10, background:'#fff', boxShadow:'0 1px 4px rgba(0,0,0,0.2)', transition:'left 0.2s' }} />
    </div>
  );

  const SettingSection = ({ id, label, children, danger, count }) => (
    <div style={{ marginBottom:8 }}>
      <div onClick={() => !danger && toggle(id)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'15px 16px', background:'rgba(255,255,255,0.9)', cursor:'pointer', borderRadius: expanded===id ? '14px 14px 0 0' : 14, border:'1px solid rgba(0,0,0,0.08)', borderBottom: expanded===id ? '1px solid rgba(0,0,0,0.05)' : '1px solid rgba(0,0,0,0.08)', transition:'border-radius 0.2s' }}>
        <span style={{ fontFamily:THEME.fontBody, fontSize:15, color: danger ? '#e11d48' : THEME.text, fontWeight:500 }}>
          {label}{count != null ? <span style={{ marginLeft:8, fontSize:12, fontWeight:700, padding:'2px 8px', borderRadius:100, background:'rgba(0,0,0,0.07)', color:THEME.textMuted }}>{count}</span> : null}
        </span>
        {!danger && (
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ transform: expanded===id ? 'rotate(180deg)' : 'rotate(0)', transition:'transform 0.2s', flexShrink:0 }}>
            <path d="M6 9l6 6 6-6" stroke={THEME.textMuted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
      </div>
      {expanded===id && (
        <div style={{ background:'rgba(255,255,255,0.7)', border:'1px solid rgba(0,0,0,0.08)', borderTop:'none', borderRadius:'0 0 14px 14px', padding:'16px' }}>
          {children}
        </div>
      )}
    </div>
  );

  return (
    <Screen>
      <div style={{ height:58 }} />
      <div style={{ flex:1, overflowY:'auto', padding:'12px 24px 0' }}>
        <h2 style={{ fontFamily:THEME.fontDisplay, fontSize:28, color:THEME.text, margin:'0 0 20px', fontWeight:700 }}>Profile</h2>

        {/* avatar card */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'24px', background:'rgba(255,255,255,0.9)', borderRadius:24, border:'1px solid rgba(0,0,0,0.08)', marginBottom:20 }}>
          <div style={{ position:'relative', marginBottom:14 }}>
            <GeometricAvatar seed={6} size={80} ring />
            <div style={{ position:'absolute', bottom:0, right:0, width:28, height:28, borderRadius:14, background:THEME.gradient, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
          <div style={{ fontFamily:THEME.fontDisplay, fontSize:22, color:THEME.text, fontWeight:700, marginBottom:4 }}>You</div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', justifyContent:'center', marginTop:8 }}>
            <IntentBadge intent="Casual Chat" />
            <div style={{ padding:'4px 12px', borderRadius:100, fontSize:12, fontWeight:600, fontFamily:THEME.fontBody, background:'rgba(0,0,0,0.05)', color:THEME.textMuted, border:'1px solid rgba(0,0,0,0.09)' }}>Man · 25–32</div>
          </div>
        </div>

        {/* stats */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:20 }}>
          {[['3','Matches'],['1','Chats'],['12','Seen']].map(([n,l]) => (
            <div key={l} style={{ background:'rgba(255,255,255,0.9)', borderRadius:16, padding:'14px 12px', textAlign:'center', border:'1px solid rgba(0,0,0,0.08)' }}>

              <div style={{ fontFamily:THEME.fontBody, fontSize:11, color:THEME.textMuted, marginTop:2 }}>{l}</div>

        {/* Edit Interests */}

          <p style={{ fontFamily:THEME.fontBody, fontSize:12, color:THEME.textMuted, marginBottom:12 }}>Pick interests · {myInterests.length} selected</p>
          <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>

        {/* Notifications */}

          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            {[['newMatch','New match'],['newMessage','New message'],['weeklyDigest','Weekly digest']].map(([k,lbl]) => (

          </div>

        {/* Sign Out */}

          <div onClick={e => e.stopPropagation()} style={{ background:'#faf6f0', borderRadius:24, padding:'28px 24px', width:'100%', boxShadow:'0 20px 60px rgba(0,0,0,0.15)', textAlign:'center' }}>
            <div style={{ width:50, height:50, borderRadius:25, background:'rgba(225,29,72,0.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>

            </div>
            <h3 style={{ fontFamily:THEME.fontDisplay, fontSize:22, color:THEME.text, fontWeight:700, margin:'0 0 8px' }}>Sign out?</h3>
            <p style={{ fontFamily:THEME.fontBody, fontSize:14, color:THEME.textMuted, margin:'0 0 24px', lineHeight:1.6 }}>Your matches and chats will be saved for when you return.</p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <GradBtn full style={{ background:'#e11d48', boxShadow:'0 4px 16px rgba(225,29,72,0.3)' }} onClick={() => { setShowSignOut(false); onNavigate('landing'); }}>Sign Out</GradBtn>
              <GradBtn full outline onClick={() => setShowSignOut(false)}>Cancel</GradBtn>
            </div>
          </div>
        </div>
      )}
    </Screen>
  );
}

Object.assign(window, {
  MOCK_PROFILES, INIT_MATCHES, INIT_MESSAGES, INTERESTS_LIST,
  LandingScreen, AuthScreen, OnboardScreen, DiscoverScreen,
  MatchModal, ChatsScreen, ChatScreen, ProfileScreen,
  ProfileCard, ActionBtn,
});

  </script>


  <script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-3">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "purple",
      "startScreen": "landing"
    }/*EDITMODE-END*/;

    const ACCENT_OPTIONS = {
      purple:   { gradient: 'linear-gradient(135deg, #7c3aed 0%, #db2777 100%)', accent: '#7c3aed', pink: '#db2777' },
      violet:   { gradient: 'linear-gradient(135deg, #6d28d9 0%, #4f46e5 100%)', accent: '#6d28d9', pink: '#4f46e5' },
      azure:    { gradient: 'linear-gradient(135deg, #2563eb 0%, #0891b2 100%)', accent: '#2563eb', pink: '#0891b2' },
      teal:     { gradient: 'linear-gradient(135deg, #0d9488 0%, #059669 100%)', accent: '#0d9488', pink: '#059669' },
      rose:     { gradient: 'linear-gradient(135deg, #e11d48 0%, #f97316 100%)', accent: '#e11d48', pink: '#f97316' },
      coral:    { gradient: 'linear-gradient(135deg, #f97316 0%, #ec4899 100%)', accent: '#f97316', pink: '#ec4899' },
      forest:   { gradient: 'linear-gradient(135deg, #059669 0%, #0d9488 100%)', accent: '#059669', pink: '#0d9488' },
      amber:    { gradient: 'linear-gradient(135deg, #d97706 0%, #dc2626 100%)', accent: '#d97706', pink: '#dc2626' },
      midnight: { gradient: 'linear-gradient(135deg, #4338ca 0%, #7c3aed 100%)', accent: '#4338ca', pink: '#7c3aed' },
    };

    function applyAccent(key) {
      const a = ACCENT_OPTIONS[key];
      if (!a) return;
      THEME.gradient = a.gradient;
      THEME.accent = a.accent;
      THEME.pink = a.pink;
    }

    function App() {
      const [screen, setScreen] = React.useState(TWEAK_DEFAULTS.startScreen);
      const [pendingMatch, setPendingMatch] = React.useState(null);
      const [matches, setMatches] = React.useState([...INIT_MATCHES]);
      const [messages, setMessages] = React.useState({ ...INIT_MESSAGES });
      const [activeChat, setActiveChat] = React.useState(null);
      const [chatHistory, setChatHistory] = React.useState([]);
      const [blockedList, setBlockedList] = React.useState([]);
      const [reportedList, setReportedList] = React.useState([]);
      const [, forceUpdate] = React.useReducer(x => x + 1, 0);

      const totalUnread = matches.reduce((s, m) => s + m.unread, 0);

      const handleMatch = (profile) => { setPendingMatch(profile); };

      const handleStartChat = () => {
        const newMatch = {
          id: Date.now(), nickname: pendingMatch.nickname,
          intent: pendingMatch.intent, interests: pendingMatch.interests,
          lastMsg: 'Matched just now', time: 'now', unread: 0, seed: pendingMatch.seed,
        };
        setMatches(m => [newMatch, ...m]);
        setMessages(prev => ({ ...prev, [newMatch.id]: [] }));
        setPendingMatch(null);
        setActiveChat(newMatch);
        setChatHistory(h => [...h, 'chats']);
        setScreen('chat');
      };

      const handleOpenChat = (match) => {
        setMatches(ms => ms.map(m => m.id === match.id ? { ...m, unread: 0 } : m));
        setActiveChat(match);
        setChatHistory(h => [...h, screen]);
        setScreen('chat');
      };

      const handleBack = () => {
        const prev = chatHistory[chatHistory.length - 1] || 'chats';
        setChatHistory(h => h.slice(0, -1));
        setScreen(prev);
      };

      const handleNavigate = (s) => { setScreen(s); };

      const handleBlock = (match) => {
        setBlockedList(b => [...b, match]);
        setMatches(ms => ms.filter(m => m.id !== match.id));
        const prev = chatHistory[chatHistory.length - 1] || 'chats';
        setChatHistory(h => h.slice(0, -1));
        setScreen(prev);
      };

      const handleReport = (match, reason) => {
        setReportedList(r => [...r, { ...match, reason }]);
      };

      const handleUnblock = (partner) => {
        setBlockedList(b => b.filter(p => p.id !== partner.id));
      };

      const renderScreen = () => {
        if (screen === 'landing') return <LandingScreen onGetStarted={() => setScreen('signup')} onSignIn={() => setScreen('signin')} />;
        if (screen === 'signin') return <AuthScreen mode="signin" onSuccess={() => setScreen('discover')} />;
        if (screen === 'signup') return <AuthScreen mode="signup" onSuccess={() => setScreen('onboard')} />;
        if (screen === 'onboard') return <OnboardScreen onComplete={() => setScreen('discover')} />;
        if (screen === 'discover') return <DiscoverScreen onNavigate={handleNavigate} onMatch={handleMatch} unreadChats={totalUnread} />;
        if (screen === 'chats') return <ChatsScreen onNavigate={handleNavigate} onOpenChat={handleOpenChat} matches={matches} />;
        if (screen === 'chat' && activeChat) return <ChatScreen match={activeChat} onBack={handleBack} messages={messages[activeChat.id] || []} onBlock={handleBlock} onReport={handleReport} />;
        if (screen === 'profile') return <ProfileScreen onNavigate={handleNavigate} blockedList={blockedList} reportedList={reportedList} onUnblock={handleUnblock} />;
        return null;
      };

      return (
        <div style={{ position: 'relative', filter: 'drop-shadow(0 0 1px rgba(0,0,0,0.09)) drop-shadow(0 32px 80px rgba(124,58,237,0.12))' }}>
          <IOSDevice width={393} height={852}>
            {renderScreen()}
            {pendingMatch && (
              <MatchModal
                profile={pendingMatch}
                onStartChat={handleStartChat}
                onDismiss={() => setPendingMatch(null)}
              />
            )}
          </IOSDevice>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // ── Tweaks ─────────────────────────────────────────────────────────────────
    const panel = document.getElementById('tweaks-panel');
    const accentRow = document.getElementById('accent-row');
    const screenRow = document.getElementById('screen-row');

    const accentKeys = ['purple','violet','azure','teal','rose','coral','forest','amber','midnight'];
    accentRow.innerHTML = '';
    screenRow.innerHTML = '';
    accentKeys.forEach(k => {
      const a = ACCENT_OPTIONS[k];
      const chip = document.createElement('div');
      chip.className = 'tweak-chip' + (k === TWEAK_DEFAULTS.accent ? ' active' : '');
      chip.textContent = k;
      chip.style.background = k === TWEAK_DEFAULTS.accent ? a.gradient : '';
      chip.addEventListener('click', () => {
        accentRow.querySelectorAll('.tweak-chip').forEach(c => {
          c.classList.remove('active'); c.style.background = '';
        });
        chip.classList.add('active');
        chip.style.background = a.gradient;
        applyAccent(k);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: k } }, '*');
        // force re-render by dispatching event
        document.dispatchEvent(new CustomEvent('tweak-change'));
      });
      accentRow.appendChild(chip);
    });

    const screenKeys = [['land','landing'],['disc','discover'],['chat','chats']];
    screenKeys.forEach(([label, key]) => {
      const chip = document.createElement('div');
      chip.className = 'tweak-chip' + (key === TWEAK_DEFAULTS.startScreen ? ' active' : '');
      chip.textContent = label;
      if (key === TWEAK_DEFAULTS.startScreen) chip.style.background = ACCENT_OPTIONS[TWEAK_DEFAULTS.accent].gradient;
      chip.addEventListener('click', () => {
        screenRow.querySelectorAll('.tweak-chip').forEach(c => { c.classList.remove('active'); c.style.background = ''; });
        chip.classList.add('active');
        chip.style.background = ACCENT_OPTIONS[TWEAK_DEFAULTS.accent]?.gradient || '';
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { startScreen: key } }, '*');
      });
      screenRow.appendChild(chip);
    });

    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') panel.classList.add('visible');
      if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('visible');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  </script>


</body></html>
